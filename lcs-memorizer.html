<style>
:root{
  --bg:#0c0e13;--surface:#13161f;--card:#191d2a;--border:#232840;
  --accent:#4f7cff;--gold:#f0c060;--green:#3ddc84;--red:#ff4f4f;
  --text:#e8eaf2;--muted:#6a7090;--radius:10px;--mono:'Courier New',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:15px;}
body{background:var(--bg);color:var(--text);font-family:'Georgia',serif;min-height:100vh;line-height:1.6;overflow-x:hidden;}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.logo{font-family:var(--mono);font-size:.95rem;color:var(--accent);letter-spacing:.08em;flex-shrink:0;}
.logo span{color:var(--gold);}
nav{display:flex;gap:4px;flex-wrap:wrap;}
.nav-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 11px;border-radius:6px;cursor:pointer;font-size:.72rem;font-family:var(--mono);letter-spacing:.05em;transition:all .15s;}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);}
.nav-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.nav-btn:disabled{opacity:.35;cursor:default;}
.nav-btn:disabled:hover{border-color:var(--border);color:var(--muted);}

/* AUTH */
.auth-bar{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.auth-bar img{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);}
.auth-bar span{font-family:var(--mono);font-size:.72rem;color:var(--muted);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.btn-sm{background:transparent;border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.7rem;font-family:var(--mono);transition:all .15s;}
.btn-sm:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-sm.primary:hover{filter:brightness(1.1);}

/* SYNC indicator */
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--border);margin-right:4px;transition:background .3s;}
.sync-dot.syncing{background:var(--gold);animation:pulse .8s infinite;}
.sync-dot.ok{background:var(--green);}
.sync-dot.err{background:var(--red);}

/* MAIN */
main{padding:18px;max-width:900px;margin:0 auto;width:100%;}

/* TOPIC GRID */
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-top:16px;}
.topic-card{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .2s;position:relative;}
.topic-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(79,124,255,.12);}
.topic-card.selected{border-color:var(--accent);background:rgba(79,124,255,.08);}
.topic-card .num{font-family:var(--mono);font-size:.66rem;color:var(--accent);letter-spacing:.1em;margin-bottom:6px;}
.topic-card .title{font-size:.82rem;color:var(--text);line-height:1.4;font-weight:bold;}
.topic-card .sub{font-size:.73rem;color:var(--muted);margin-top:5px;line-height:1.4;}
.topic-card .stats{font-family:var(--mono);font-size:.68rem;color:var(--accent);margin-top:8px;}
.topic-card .chk{position:absolute;top:9px;right:9px;width:18px;height:18px;border-radius:50%;background:var(--accent);display:none;align-items:center;justify-content:center;font-size:.6rem;color:#fff;}
.topic-card.selected .chk{display:flex;}
.h2{font-family:var(--mono);font-size:.66rem;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px;}
.screen-title{font-size:1.2rem;color:var(--text);margin-bottom:4px;}
.screen-sub{font-size:.83rem;color:var(--muted);}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;animation:fadeIn .25s ease;}
.card-header{font-family:var(--mono);font-size:.66rem;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:9px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
.card-header span{color:var(--muted);font-size:.63rem;}
.art-badge{display:inline-block;background:linear-gradient(135deg,var(--accent),#7b5fe8);color:#fff;font-family:var(--mono);font-size:.8rem;font-weight:bold;padding:4px 13px;border-radius:20px;margin-bottom:9px;letter-spacing:.06em;}
.art-title{font-size:1rem;color:var(--gold);margin-bottom:12px;line-height:1.4;}
.orig{background:var(--bg);border-radius:6px;padding:13px;border:1px solid var(--border);font-size:.86rem;line-height:1.8;white-space:pre-wrap;}

/* INPUTS */
textarea,input[type=text]{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:.86rem;padding:9px 13px;width:100%;resize:vertical;transition:border-color .15s;outline:none;}
textarea:focus,input[type=text]:focus{border-color:var(--accent);}
.lbl{font-family:var(--mono);font-size:.66rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;margin-top:13px;}

/* BUTTONS */
.btn{background:var(--accent);border:none;border-radius:6px;color:#fff;cursor:pointer;font-family:var(--mono);font-size:.76rem;letter-spacing:.06em;padding:8px 18px;transition:all .15s;}
.btn:hover{filter:brightness(1.15);}
.btn:active{transform:scale(.97);}
.btn-o{background:transparent;border:1px solid var(--accent);color:var(--accent);}
.btn-o:hover{background:var(--accent);color:#fff;}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-g:hover{border-color:var(--muted);color:var(--text);}
.btn-gold{background:var(--gold);color:#000;}
.btn-green{background:var(--green);color:#000;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;}

/* DIFF BUTTONS */
.diff-row{display:flex;gap:8px;margin-top:10px;}
.db{flex:1;padding:8px 4px;border-radius:6px;cursor:pointer;font-family:var(--mono);font-size:.72rem;transition:all .15s;border:1px solid;text-align:center;}
.db-e{background:rgba(61,220,132,.1);color:var(--green);border-color:var(--green);}
.db-e:hover{background:var(--green);color:#000;}
.db-m{background:rgba(240,192,96,.1);color:var(--gold);border-color:var(--gold);}
.db-m:hover{background:var(--gold);color:#000;}
.db-h{background:rgba(255,79,79,.1);color:var(--red);border-color:var(--red);}
.db-h:hover{background:var(--red);color:#fff;}

/* FEEDBACK */
.fb{border-radius:6px;padding:13px 16px;margin-top:12px;display:none;font-size:.86rem;line-height:1.7;}
.fb.show{display:block;}
.fb.good{background:rgba(61,220,132,.07);border-left:3px solid var(--green);}
.fb.warn{background:rgba(240,192,96,.07);border-left:3px solid var(--gold);}
.fb.bad{background:rgba(255,79,79,.07);border-left:3px solid var(--red);}
.score{font-family:var(--mono);font-size:1.15rem;font-weight:bold;color:var(--gold);margin-bottom:8px;}
.ktag{display:inline-block;font-family:var(--mono);font-size:.7rem;padding:2px 8px;border-radius:4px;margin:2px;}
.ktag.hit{background:rgba(61,220,132,.12);color:var(--green);border:1px solid rgba(61,220,132,.35);}
.ktag.miss{background:rgba(255,79,79,.1);color:var(--red);border:1px solid rgba(255,79,79,.3);}

/* CLOZE */
.cloze-wrap{font-size:.93rem;line-height:2.6;background:var(--bg);border-radius:6px;padding:15px;border:1px solid var(--border);}
.ci{display:inline-block;background:transparent;border:none;border-bottom:2px solid var(--accent);color:var(--accent);font-family:var(--mono);font-size:.88rem;padding:0 4px;outline:none;text-align:center;vertical-align:middle;}
.ci.ok{border-color:var(--green);color:var(--green);}
.ci.ko{border-color:var(--red);color:var(--red);}
.ca{font-family:var(--mono);font-size:.8rem;color:var(--gold);font-weight:bold;}

/* ESTRUCTURA */
.slist{list-style:none;margin-top:10px;}
.si{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:9px 13px;margin-bottom:7px;display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:.82rem;transition:all .2s;cursor:grab;}
.si:active{cursor:grabbing;opacity:.5;}
.si.ok{border-color:var(--green);background:rgba(61,220,132,.05);}
.si.ko{border-color:var(--red);background:rgba(255,79,79,.05);}
.drag-icon{color:var(--muted);user-select:none;}
.snum{color:var(--muted);min-width:20px;}

/* TIMER */
.timer{font-family:var(--mono);font-size:3rem;color:var(--gold);text-align:center;margin:14px 0;letter-spacing:.1em;transition:color .3s;}
.timer.urgent{color:var(--red);animation:pulse 1s infinite;}
.tcontrols{display:flex;gap:10px;justify-content:center;margin-bottom:14px;align-items:center;flex-wrap:wrap;}
.tcontrols select{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:.83rem;padding:6px 11px;outline:none;}

/* METRICS */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:11px;margin-bottom:18px;}
.mbox{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center;}
.mval{font-family:var(--mono);font-size:1.7rem;font-weight:bold;color:var(--accent);line-height:1;}
.mlbl{font-size:.7rem;color:var(--muted);margin-top:5px;font-family:var(--mono);}
table{width:100%;border-collapse:collapse;font-size:.78rem;}
th{font-family:var(--mono);font-size:.63rem;color:var(--muted);letter-spacing:.08em;padding:8px 9px;border-bottom:1px solid var(--border);text-align:left;}
td{padding:8px 9px;border-bottom:1px solid rgba(35,40,64,.4);}
tr:hover td{background:rgba(79,124,255,.03);}
.be{color:var(--green);font-family:var(--mono);font-size:.7rem;}
.bm{color:var(--gold);font-family:var(--mono);font-size:.7rem;}
.bh{color:var(--red);font-family:var(--mono);font-size:.7rem;}

/* PROGRESS */
.pbar{height:3px;background:var(--border);border-radius:2px;margin-bottom:14px;overflow:hidden;}
.pbfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .4s;}
.pinfo{font-family:var(--mono);font-size:.68rem;color:var(--muted);margin-bottom:11px;}

/* MISC */
.divider{height:1px;background:var(--border);margin:12px 0;}
.pill{display:inline-block;font-family:var(--mono);font-size:.66rem;padding:2px 9px;border-radius:20px;background:rgba(79,124,255,.1);color:var(--accent);border:1px solid rgba(79,124,255,.25);margin:2px;}
.queue-info{display:flex;gap:14px;flex-wrap:wrap;font-family:var(--mono);font-size:.73rem;color:var(--muted);margin-bottom:14px;}
.queue-info b{color:var(--text);}
.empty{text-align:center;padding:40px;color:var(--muted);font-family:var(--mono);font-size:.83rem;}
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:18px;}

@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
@media(max-width:600px){.topic-grid{grid-template-columns:1fr 1fr;}.mgrid{grid-template-columns:1fr 1fr;}}

/* ── MOTIVACIÓN LAYER ── */
.home-header{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:18px;}
.home-stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;}
.home-stat .hs-val{font-family:var(--mono);font-size:2rem;font-weight:bold;line-height:1;}
.home-stat .hs-lbl{font-size:.68rem;color:var(--muted);font-family:var(--mono);text-transform:uppercase;margin-top:4px;letter-spacing:.08em;}
.home-stat.streak .hs-val{color:var(--gold);}
.home-stat.domain .hs-val{color:var(--accent);}
.home-stat.risk .hs-val{color:var(--green);}
.home-stat.risk.warn .hs-val{color:var(--gold);}
.home-stat.risk.danger .hs-val{color:var(--red);}
.btn-session{background:linear-gradient(135deg,var(--accent),#7b5fe8);border:none;border-radius:8px;color:#fff;cursor:pointer;font-family:var(--mono);font-size:.82rem;letter-spacing:.06em;padding:10px 22px;transition:all .2s;white-space:nowrap;}
.btn-session:hover{filter:brightness(1.12);transform:translateY(-1px);}

.mot-block{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
.mot-block-title{font-family:var(--mono);font-size:.63rem;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;margin-bottom:13px;border-bottom:1px solid var(--border);padding-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.mot-block-title span{color:var(--muted);font-size:.6rem;}

.hoy-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.hoy-stat{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;}
.hoy-stat .hv{font-family:var(--mono);font-size:1.4rem;font-weight:bold;color:var(--text);line-height:1;}
.hoy-stat .hl{font-size:.65rem;color:var(--muted);font-family:var(--mono);margin-top:3px;}

.trend{font-family:var(--mono);font-size:.82rem;display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;}
.trend.up{color:var(--green);background:rgba(61,220,132,.1);}
.trend.down{color:var(--red);background:rgba(255,79,79,.08);}
.trend.flat{color:var(--muted);background:rgba(106,112,144,.1);}

.fragile-list{display:flex;flex-direction:column;gap:7px;}
.fragile-item{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:9px 13px;font-size:.8rem;}
.fragile-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.fragile-dot.red{background:var(--red);}
.fragile-dot.orange{background:var(--orange);}
.fragile-dot.yellow{background:var(--gold);}
.fragile-dot.green{background:var(--green);}
.fragile-name{flex:1;color:var(--text);}
.fragile-score{font-family:var(--mono);font-size:.72rem;color:var(--muted);}

.rec-banner{background:rgba(79,124,255,.07);border:1px solid rgba(79,124,255,.2);border-radius:8px;padding:14px 17px;font-size:.85rem;line-height:1.65;color:var(--text);}
.rec-banner .rec-icon{font-size:1.1rem;margin-right:6px;}

.mot-loading{text-align:center;padding:24px;color:var(--muted);font-family:var(--mono);font-size:.78rem;}
.mot-empty{text-align:center;padding:16px;color:var(--muted);font-family:var(--mono);font-size:.75rem;}

.progress-row{display:flex;gap:14px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
.prog-label{font-family:var(--mono);font-size:.7rem;color:var(--muted);min-width:80px;}
.prog-bar-wrap{flex:1;background:var(--border);border-radius:3px;height:5px;overflow:hidden;min-width:80px;}
.prog-bar-fill{height:100%;border-radius:3px;transition:width .6s;}

@media(max-width:640px){
  .home-header{grid-template-columns:1fr 1fr;}
  .home-header .btn-session{grid-column:1/-1;}
  .hoy-grid{grid-template-columns:1fr 1fr;}
}
</style>

<script>
/* ================================================================
   DATOS — TEMAS 7, 8, 9, 10
   ================================================================ */
const TEMAS = [
  {
    id:7, titulo:"Elementos Formales del Contrato",
    sub:"Póliza · Proposición · Solicitud · Comercialización a Distancia",
    arts:[
      {
        id:"t7_a5",art:"Art. 5 LCS",tema:7,
        tit:"Forma del Contrato de Seguro",
        trigger:["formalizar","escrito","modificaciones","adiciones","póliza","cobertura provisional","entrega","tomador"],
        struct:["Contrato y modificaciones/adiciones: formalizadas por ESCRITO","Asegurador obligado a entregar al tomador la PÓLIZA","O al menos el documento de COBERTURA PROVISIONAL","En modalidades especiales: entregar el documento que establezcan las disposiciones"],
        lit:`El contrato de seguro y sus modificaciones y adiciones deberán ser formalizadas por escrito. El asegurador está obligado a entregar al tomador del seguro la póliza o, al menos, el documento de cobertura provisional. En las modalidades de seguro en que por disposiciones especiales no se exija la emisión de la póliza, el asegurador estará obligado a entregar el documento que en ellas se establezca.`,
        cloze:`El contrato de seguro y sus [modificaciones] y adiciones deberán ser [formalizadas] por [escrito]. El asegurador está obligado a [entregar] al tomador del seguro la [póliza] o, al menos, el documento de [cobertura provisional]. En las modalidades en que por disposiciones especiales no se exija la emisión de la póliza, el asegurador estará obligado a entregar el [documento] que en ellas se establezca.`
      },
      {
        id:"t7_a6",art:"Art. 6 LCS",tema:7,
        tit:"Solicitud y Proposición de Seguro",
        trigger:["solicitud","no vincula","proposición","15 días","vinculará","retrotraerse","presentó","formuló"],
        struct:["Solicitud de seguro: NO vincula al solicitante","Proposición del asegurador: vincula al proponente 15 días","Por acuerdo: efectos pueden retrotraerse al momento de la solicitud o proposición"],
        lit:`La solicitud de seguro no vinculará al solicitante. La proposición de seguro por el asegurador vinculará al proponente durante un plazo de 15 días.\n\nPor acuerdo de las partes, los efectos del seguro podrán retrotraerse al momento en que se presentó la solicitud o se formuló la proposición.`,
        cloze:`La [solicitud] de seguro [no] vinculará al solicitante. La [proposición] de seguro por el asegurador vinculará al proponente durante un plazo de [15 días].\n\nPor [acuerdo] de las partes, los efectos del seguro podrán [retrotraerse] al momento en que se [presentó] la solicitud o se [formuló] la proposición.`
      },
      {
        id:"t7_a8",art:"Art. 8 LCS",tema:7,
        tit:"Contenido Mínimo de la Póliza",
        trigger:["lengua española","nombre","domicilio","concepto","riesgo","exclusiones","objetos","suma asegurada","prima","vencimiento","duración","mediador","póliza flotante"],
        struct:["Redacción: a elección del tomador en lengua oficial del lugar","1. Nombre/denominación, domicilio de partes + asegurado y beneficiario","2. Concepto en que se asegura","3. Naturaleza del riesgo: coberturas y exclusiones (destacadas tipográficamente)","4. Designación de objetos asegurados y su situación","5. Suma asegurada o alcance de la cobertura","6. Importe de prima, recargos e impuestos","7. Vencimiento, lugar y forma de pago de primas","8. Duración del contrato: día y hora de inicio y fin","9. Nombre y tipo de mediador si interviene","Póliza flotante: añadir forma de declaración del abono","Divergencia póliza/proposición: tomador puede reclamar en 1 mes"],
        lit:`La póliza del contrato deberá redactarse, a elección del tomador del seguro, en cualquiera de las lenguas españolas oficiales en el lugar donde aquélla se formalice.\n\nContendrá como mínimo:\n1. Nombre y apellidos o denominación social de las partes contratantes y su domicilio, así como la designación del asegurado y beneficiario, en su caso.\n2. El concepto en el cual se asegura.\n3. Naturaleza del riesgo cubierto, describiendo, de forma clara y comprensible, las garantías y coberturas otorgadas en el contrato, así como respecto a cada una de ellas, las exclusiones y limitaciones que les afecten destacadas tipográficamente.\n4. Designación de los objetos asegurados y su situación.\n5. Suma asegurada o alcance de la cobertura.\n6. Importe de la prima, recargos e impuestos.\n7. Vencimiento de las primas, lugar y forma de pago.\n8. Duración del contrato, con expresión del día y la hora en que comienzan y terminan sus efectos.\n9. Si interviene un mediador en el contrato, el nombre y tipo de mediador.\n\nEn caso de póliza flotante, se especificará además la forma en que debe hacerse la declaración del abono.`,
        cloze:`La póliza deberá redactarse, a [elección] del tomador, en cualquiera de las [lenguas españolas oficiales].\n\nContendrá como [mínimo]:\n1. [Nombre] y apellidos o denominación social y [domicilio] de las partes, y designación del [asegurado] y beneficiario.\n2. El [concepto] en que se asegura.\n3. Naturaleza del [riesgo]: coberturas y [exclusiones] destacadas [tipográficamente].\n4. Designación de [objetos asegurados] y su situación.\n5. [Suma asegurada] o alcance de la cobertura.\n6. Importe de la [prima], recargos e impuestos.\n7. [Vencimiento] de las primas, lugar y forma de pago.\n8. [Duración]: día y hora de inicio y fin.\n9. Nombre y tipo de [mediador] si interviene.\n\nEn póliza [flotante]: forma en que debe hacerse la declaración del [abono].`
      },

        tit:"Deber de Declaración del Riesgo",
        trigger:["tomador","deber","cuestionario","circunstancias","valoración del riesgo","exonerado","rescisión","un mes","reserva","inexactitud"],
        struct:["Tomador: deber de declarar circunstancias que influyan en el riesgo","Según cuestionario que el asegurador someta","Exonerado: si no hay cuestionario o circunstancias no comprendidas en él","Asegurador puede rescindir: plazo 1 mes desde conocimiento de reserva/inexactitud","Primas del período en curso: corresponden al asegurador salvo dolo/culpa grave suya"],
        lit:`El tomador del seguro tiene el deber, antes de la conclusión el contrato, de declarar al asegurador, de acuerdo con el cuestionario que éste le someta, todas las circunstancias por él conocidas que puedan influir en la valoración del riesgo. Quedará exonerado de tal deber si el asegurador no le somete cuestionario o cuando, aun sometiéndoselo, se trate de circunstancias que puedan influir en la valoración del riesgo y que no estén comprendidas en él.\n\nEl asegurador podrá rescindir el contrato mediante declaración dirigida al tomador del seguro en el plazo de un mes, a contar del conocimiento de la reserva o inexactitud del tomador del seguro.`,
        cloze:`El [tomador] del seguro tiene el [deber], antes de la conclusión del contrato, de [declarar] al asegurador, de acuerdo con el [cuestionario] que éste le someta, todas las [circunstancias] por él conocidas que puedan influir en la [valoración del riesgo]. Quedará [exonerado] si el asegurador no le somete [cuestionario] o cuando las circunstancias no estén [comprendidas] en él.\n\nEl asegurador podrá [rescindir] el contrato en el plazo de [un mes], a contar del conocimiento de la [reserva] o [inexactitud] del tomador.`
      },

        struct:["Objeto: régimen de contratos a distancia de servicios financieros con consumidores","Ámbito subjetivo: entidades de crédito, aseguradoras, gestoras, mediadores y otras","Carácter imperativo: consumidores no pueden renunciar a sus derechos","Contrato a distancia: negociación y celebración exclusivamente sin presencia física simultánea","Derecho de desistimiento: 14 días naturales sin motivo ni penalización","Seguros de vida: plazo de desistimiento es 30 días","Excepciones al desistimiento: seguros de inversión, viaje < 1 mes, efectos terminados antes del plazo"],
        lit:`La Ley 22/2007 establece el régimen específico aplicable a los contratos con consumidores de servicios financieros prestados, negociados o celebrados a distancia.\n\nÁmbito subjetivo: entidades de crédito, empresas de servicios de inversión, entidades aseguradoras, sociedades gestoras de IIC, entidades gestoras de fondos de pensiones, mediadores de seguros y cualesquiera otras que presten servicios financieros.\n\nCarácter imperativo: los consumidores no podrán renunciar a los derechos que les reconoce esta ley.\n\nDerecho de desistimiento (art. 10): el consumidor dispone de 14 días naturales para desistir sin indicación de motivos y sin penalización alguna. El plazo será de 30 días naturales en el caso de los seguros de vida.\n\nNo se aplica a: contratos de seguros en los que el tomador asume el riesgo de la inversión, contratos de viaje o equipaje con duración inferior a 1 mes, aquellos cuyos efectos terminen antes del plazo de desistimiento, los que den cumplimiento a una obligación de aseguramiento, y los planes de previsión asegurados.`,
        cloze:`La Ley [22/2007] establece el régimen de contratos [a distancia] de servicios [financieros] con consumidores.\n\nÁmbito: entidades de crédito, [aseguradoras], gestoras, [mediadores de seguros] y otras que presten servicios financieros.\n\nCarácter [imperativo]: los consumidores no podrán [renunciar] a sus derechos.\n\nDerecho de [desistimiento]: [14 días] naturales sin motivos y sin [penalización]. En seguros de [vida]: [30 días].\n\nNo aplica a: seguros en que el tomador asume el [riesgo de la inversión], viaje < [1 mes], efectos terminados antes del plazo, obligación de [aseguramiento] y planes de [previsión asegurados].`
      }

        struct:["Condiciones generales: NO pueden tener carácter lesivo para los asegurados","Incluirse en proposición y NECESARIAMENTE en póliza o documento complementario","Suscrito por asegurado + entrega de copia al asegurado","Redacción: clara y precisa","Cláusulas limitativas: destacar de modo ESPECIAL + aceptación ESPECÍFICA por ESCRITO","Sometidas a vigilancia de la Administración Pública","TS declara nulidad → Administración obliga a modificar cláusulas idénticas en todas las pólizas"],
        lit:`Las condiciones generales, que en ningún caso podrán tener carácter lesivo para los asegurados, habrán de incluirse por el asegurador en la proposición de seguro si la hubiere y necesariamente en la póliza de contrato o en un documento complementario, que se suscribirá por el asegurado y al que se entregará copia del mismo. Las condiciones generales y particulares se redactarán de forma clara y precisa. Se destacarán de modo especial las cláusulas limitativas de los derechos de los asegurados, que deberán ser específicamente aceptadas por escrito.\n\nLas condiciones generales del contrato estarán sometidas a la vigilancia de la Administración Pública en los términos previstos por la Ley.\n\nDeclarada por el Tribunal Supremo la nulidad de alguna de las cláusulas de las condiciones generales de un contrato, la Administración Pública competente obligará a los aseguradores a modificar las cláusulas idénticas contenidas en sus pólizas.`,

        struct:["Tomador/asegurado/beneficiario: comunicar siniestro en 7 días de haberlo conocido","Plazo ampliable en la póliza","Incumplimiento: asegurador puede reclamar daños y perjuicios","Excepción: no aplica si asegurador conoció el siniestro por otro medio","Además: dar al asegurador toda clase de informaciones sobre circunstancias y consecuencias"],
        lit:`El tomador del seguro o el asegurado o el beneficiario deberán comunicar al asegurador el acaecimiento del siniestro dentro del plazo máximo de siete días de haberlo conocido, salvo que se haya fijado en la póliza un plazo más amplio. En caso de incumplimiento, el asegurador podrá reclamar los daños y perjuicios causados por la falta de declaración.\n\nEste efecto no se producirá si se prueba que el asegurador ha tenido conocimiento del siniestro por otro medio.\n\nEl tomador del seguro o el asegurado deberá, además, dar al asegurador toda clase de informaciones sobre las circunstancias y consecuencias del siniestro.`,

      {
        id:"t8_a20",art:"Art. 20 LCS",tema:8,
        tit:"La Mora del Asegurador",
        trigger:["mora","3 meses","40 días","interés legal","50%","2 años","20%","de oficio","siniestro","importe mínimo","transcurridos"],
        struct:["Mora cuando: no cumple prestación en 3 meses desde el siniestro","O no paga importe mínimo en 40 días desde declaración del siniestro","Interés por mora: interés legal del dinero + 50%","Transcurridos 2 años desde siniestro: mínimo 20% anual","Se impone DE OFICIO por el órgano judicial","Cómputo inicio: fecha del siniestro (regla general)","No hay mora si incumplimiento por causa justificada o no imputable"],
        lit:`El asegurador incurre en mora cuando no hubiere cumplido su prestación en el plazo de 3 meses desde la producción del siniestro, o no hubiere efectuado el pago del importe mínimo dentro de los 40 días a partir de la recepción de la declaración del siniestro.\n\nLa indemnización por mora consistirá en el pago de un interés anual igual al interés legal del dinero, incrementado en el 50%. Transcurridos 2 años desde la producción del siniestro, el interés anual no podrá ser inferior al 20%. Dicha indemnización se impondrá de oficio por el órgano judicial.`,
        cloze:`El asegurador incurre en [mora] cuando no hubiere cumplido su prestación en el plazo de [3 meses] desde la producción del siniestro, o no hubiere efectuado el pago del importe [mínimo] dentro de los [40 días] a partir de la recepción de la declaración del siniestro.\n\nLa indemnización por mora: interés legal del dinero incrementado en el [50%]. Transcurridos [2 años] desde el siniestro, el interés no podrá ser inferior al [20%]. Se impondrá de [oficio] por el órgano judicial.`
      },

        lit:`La duración del contrato será determinada en la póliza, la cual no podrá fijar un plazo superior a diez años. Sin embargo, podrá establecerse que se prorrogue una o más veces por un período no superior a un año cada vez.\n\nLas partes pueden oponerse a la prórroga del contrato mediante una notificación escrita a la otra parte, efectuada con un plazo de, al menos, un mes de anticipación a la conclusión del período del seguro en curso cuando quien se oponga a la prórroga sea el tomador, y de dos meses cuando sea el asegurador.\n\nEl asegurador deberá comunicar al tomador, al menos con dos meses de antelación a la conclusión del período en curso, cualquier modificación del contrato de seguro.`,
        cloze:`La [duración] del contrato será determinada en la póliza, la cual no podrá fijar un plazo superior a [diez años]. Sin embargo, podrá establecerse que se [prorrogue] una o más veces por un período no superior a [un año] cada vez.\n\nLas partes pueden [oponerse] a la prórroga mediante notificación [escrita]: mínimo [un mes] cuando se oponga el [tomador], y [dos meses] cuando sea el [asegurador].\n\nEl asegurador comunicará al tomador con al menos [dos meses] de antelación cualquier [modificación] del contrato.`

        trigger:["póliza estimada","valor convenido","acuerdo","cálculo indemnización","impugnar","violencia","intimidación","dolo","error","notablemente superior","pericialmente"],
        struct:["Las partes pueden fijar de común acuerdo el valor del interés en la póliza","Se entiende póliza ESTIMADA cuando asegurador y asegurado aceptan expresamente el valor asignado","El asegurador SOLO puede impugnar el valor estimado en 3 casos:","1. Su aceptación fue prestada por violencia, intimidación o dolo","2. Por error la estimación es notablemente superior al valor real (fijado pericialmente)","3. No hay otros supuestos de impugnación"],

        cloze:`Las partes, de [común acuerdo], podrán fijar en la póliza el [valor del interés] asegurado para el cálculo de la [indemnización].\n\nSe entiende póliza [estimada] cuando asegurador y asegurado hayan [aceptado expresamente] el valor asignado al interés.\n\nEl asegurador únicamente podrá [impugnar] el valor estimado cuando su aceptación haya sido prestada por [violencia], [intimidación] o [dolo], o cuando por [error] la estimación sea [notablemente superior] al valor real fijado [pericialmente].`

        struct:["Sobreseguro: suma asegurada supera NOTABLEMENTE el valor del interés","Cualquier parte puede exigir reducción de suma y prima","Asegurador restituye exceso de primas percibidas","Si siniestro: asegurador indemniza el daño EFECTIVAMENTE causado","Si sobreseguro por MALA FE del asegurado: contrato INEFICAZ","Asegurador de buena fe puede retener primas vencidas y del período en curso"],
        lit:`Si la suma asegurada supera notablemente el valor del interés asegurado, cualquiera de las partes del contrato podrá exigir la reducción de la suma y de la prima, debiendo restituir el asegurador el exceso de las primas percibidas. Si se produjere el siniestro, el asegurador indemnizará el daño efectivamente causado.\n\nCuando el sobreseguro previsto en el párrafo anterior se debiera a mala fe del asegurado el contrato será ineficaz. El asegurador de buena fe podrá, no obstante, retener las primas vencidas y las del período en curso.`,
        cloze:`Si la suma asegurada supera [notablemente] el valor del interés asegurado, cualquiera de las partes podrá exigir la [reducción] de la suma y de la [prima], debiendo [restituir] el asegurador el exceso de las primas. Si se produjere el siniestro, el asegurador indemnizará el daño [efectivamente] causado.\n\nCuando el sobreseguro se debiera a [mala fe] del asegurado el contrato será [ineficaz]. El asegurador de buena fe podrá [retener] las primas [vencidas] y del período en curso.`

        id:"t9_a32",art:"Art. 32 LCS",tema:9,
        tit:"Seguro Múltiple",
        trigger:["seguro múltiple","mismo riesgo","mismo interés","período idéntico","comunicar","dolo","proporción","repetir","no obligados"],
        struct:["Definición: 2+ contratos, mismo tomador, distintos aseguradores, mismo riesgo/interés/período","Tomador debe comunicar a cada asegurador los demás seguros (salvo pacto)","Dolo en omisión + sobreseguro + siniestro → aseguradores NO obligados a pagar","Tras siniestro: comunicar a cada asegurador los demás seguros","Aseguradores contribuyen en PROPORCIÓN a su suma asegurada","Límite: no superar la cuantía del daño","Quien pagó de más puede REPETIR contra el resto"],
        lit:`Cuando en dos o más contratos estipulados por el mismo tomador con distintos aseguradores se cubran los efectos que un mismo riesgo puede producir sobre el mismo interés y durante idéntico período de tiempo el tomador del seguro o el asegurado deberán, salvo pacto en contrario, comunicar a cada asegurador los demás seguros que estipule. Si por dolo se omitiera esta comunicación, y en caso de sobreseguro se produjera el siniestro, los aseguradores no están obligados a pagar la indemnización.\n\nLos aseguradores contribuirán al abono de la indemnización en proporción a la propia suma asegurada, sin que pueda superarse la cuantía del daño. Dentro de este límite el asegurado puede pedir a cada asegurador la indemnización debida, según el respectivo contrato. El asegurador que ha pagado una cantidad superior a la que proporcionalmente le corresponda podrá repetir contra el resto de los aseguradores.`,
        cloze:`Cuando en dos o más contratos por el mismo tomador con distintos aseguradores se cubran el mismo [riesgo] sobre el mismo [interés] durante [idéntico período], el tomador deberá [comunicar] a cada asegurador los demás seguros. Si por [dolo] se omitiera y en caso de [sobreseguro] con siniestro, los aseguradores [no] están obligados a pagar la [indemnización].\n\nLos aseguradores contribuirán en [proporción] a la propia suma asegurada, sin superar la cuantía del [daño]. El que pagó de más podrá [repetir] contra el resto.`
      },
      {
        id:"t9_a33",art:"Art. 33 LCS",tema:9,
        tit:"Coaseguro",
        trigger:["coaseguro","mismo interés","mismo riesgo","cuotas","acuerdo","tomador","asegurador delegado","proporción","repetir"],
        struct:["Coaseguro: reparto de cuotas determinadas entre varios aseguradores","Previo acuerdo entre ellos y el tomador","Cada asegurador obligado al pago en proporción a su cuota (salvo pacto)","Si existe asegurador delegado: legitimado para ejercitar todos los derechos y recibir declaraciones","El que pagó de más puede repetir contra el resto"],
        lit:`Cuando mediante uno o varios contratos de seguros, referentes al mismo interés, riesgo y tiempo, se produce un reparto de cuotas determinadas entre varios aseguradores, previo acuerdo entre ellos y el tomador, cada asegurador está obligado, salvo pacto en contrario, al pago de la indemnización solamente en proporción a la cuota respectiva.\n\nNo obstante, si en el pacto de coaseguro existe un encargo a favor de uno o varios aseguradores para suscribir los documentos contractuales o para pedir el cumplimiento del contrato al asegurado en nombre del resto, se entenderá que los aseguradores delegados están legitimados para ejercitar todos los derechos y para recibir cuantas declaraciones y reclamaciones correspondan al asegurado. El asegurador que ha pagado una cantidad superior a la que le corresponda podrá repetir contra el resto de los aseguradores.`,
        cloze:`Cuando se produce un reparto de [cuotas determinadas] entre varios aseguradores sobre el mismo [interés], [riesgo] y tiempo, previo [acuerdo] entre ellos y el tomador, cada asegurador está obligado, salvo pacto, al pago en [proporción] a la cuota respectiva.\n\nSi existe [asegurador delegado]: legitimado para ejercitar todos los [derechos] y recibir cuantas [declaraciones] y reclamaciones correspondan al asegurado. El que pagó de más puede [repetir] contra el resto.`
      },
      {
        id:"t9_a43",art:"Art. 43 LCS",tema:9,
        tit:"Subrogación del Asegurador",
        trigger:["subrogación","pagada indemnización","derechos","acciones","responsables","límite","perjuicio asegurado","parientes","tercer grado","dolo","contrato de seguro"],
        struct:["Asegurador: una vez PAGADA la indemnización puede subrogarse","En derechos y acciones del asegurado contra responsables del siniestro","Hasta el LÍMITE de la indemnización","No puede ejercitarlo en PERJUICIO del asegurado","SIN derecho de subrogación contra: personas cuya responsabilidad derive del asegurado (por ley)","SIN derecho contra: parientes directos o colaterales hasta 3er grado civil que convivan con el asegurado","EXCEPCIÓN doble: si hay DOLO o si la responsabilidad está amparada en CONTRATO DE SEGURO"],
        lit:`El asegurador, una vez pagada la indemnización podrá ejercitar los derechos y las acciones que por razón del siniestro correspondieran al asegurado frente a las personas responsables del mismo, hasta el límite de la indemnización.\n\nEl asegurador no podrá ejercitar en perjuicio del asegurado los derechos en que se haya subrogado.\n\nEl asegurador no tendrá derecho a la subrogación contra ninguna de las personas cuyos actos u omisiones den origen a responsabilidad del asegurado, de acuerdo con la Ley, ni contra el causante del siniestro que sea, respecto del asegurado, pariente en línea directa o colateral dentro del tercer grado civil de consanguinidad, padre adoptante o hijo adoptivo que convivan con el asegurado. Pero esta norma no tendrá efecto si la responsabilidad proviene de dolo o si la responsabilidad está amparada mediante un contrato de seguro.`,
        cloze:`El asegurador, una vez [pagada] la indemnización podrá ejercitar los [derechos] y las [acciones] que correspondieran al asegurado frente a las personas [responsables] del siniestro, hasta el [límite] de la indemnización.\n\nNo podrá ejercitarlo en [perjuicio] del asegurado.\n\nSIN derecho de [subrogación] contra parientes en línea [directa] o colateral dentro del [tercer grado] civil que [convivan] con el asegurado. EXCEPCIÓN: si la responsabilidad proviene de [dolo] o está amparada en [contrato de seguro].`
      }
    ]

        struct:["Cobertura: objetos descritos en la póliza","Mobiliario: incluye cosas de uso ordinario o común","Del asegurado y familiares, dependientes y convivientes","EXCLUSIONES salvo pacto expreso en contrario:","Valores mobiliarios públicos o privados","Efectos de comercio y billetes de Banco","Piedras y metales preciosos","Objetos artísticos u otros de valor","Aunque se pruebe preexistencia y destrucción por el siniestro"],

      {

      {
        id:"t10_a49",art:"Art. 49 LCS",tema:10,
        tit:"Seguro de Incendios — Alcance de la Indemnización",
        trigger:["acción directa fuego","consecuencias inevitables","medidas autoridad","transporte efectos salvarlos","menoscabos salvados","objetos desaparecidos","preexistencia","robados"],
        struct:["Asegurador indemniza daños por acción directa del fuego","Y daños por consecuencias INEVITABLES del incendio, en particular:","1. Daños por medidas para impedir/cortar/extinguir el incendio (excl. gastos salvo pacto)","2. Gastos de transporte de efectos asegurados para salvarlos","3. Menoscabos de objetos salvados por las circunstancias anteriores","4. Valor de objetos desaparecidos si asegurado acredita preexistencia (salvo que asegurador pruebe robo/hurto)","5. Cualesquiera otros consignados en la póliza"],
        lit:`El asegurador indemnizará todos los daños y pérdidas materiales causados por la acción directa del fuego, así como los producidos por las consecuencias inevitables del incendio y en particular:\n\n1. Los daños que ocasionen las medidas necesarias adoptadas por la autoridad o el asegurado para impedir, cortar o extinguir el incendio, con exclusión de los gastos que ocasione la aplicación de tales medidas, salvo pacto en contrario.\n2. Los gastos que ocasione al asegurado el transporte de los efectos asegurados o cualesquiera otras medidas adoptadas con el fin de salvarlos del incendio.\n3. Los menoscabos que sufran los objetos salvados por las circunstancias descritas en los dos números anteriores.\n4. El valor de los objetos desaparecidos, siempre que el asegurado acredite su preexistencia y salvo que el asegurador pruebe que fueron robados o hurtados.\n5. Cualesquiera otros que se consignen en la póliza.`,
        cloze:`El asegurador indemnizará los daños por la [acción directa] del fuego y por las [consecuencias inevitables] del incendio:\n\n1. Daños por medidas para [impedir, cortar o extinguir] el incendio (excluidos los [gastos] de tales medidas salvo pacto).\n2. [Gastos] de transporte de efectos asegurados para [salvarlos].\n3. [Menoscabos] de objetos salvados por las circunstancias anteriores.\n4. Valor de objetos [desaparecidos], si el asegurado acredita [preexistencia], salvo que el asegurador pruebe que fueron [robados o hurtados].\n5. Cualesquiera otros que se [consignen] en la póliza.`

      {

        trigger:["negligencia grave","lugar póliza","transporte","riesgos extraordinarios","salvo pacto","dependan","consentidas"],
        struct:["Asegurador NO obligado salvo pacto en contrario cuando:","1. Negligencia grave del asegurado, tomador o personas que dependan/convivan","2. Objeto sustraído fuera del lugar de la póliza o en transporte (sin consentimiento asegurador)","3. Sustracción con ocasión de riesgos extraordinarios"],
        lit:`El asegurador, salvo pacto en contrario, no vendrá obligado a reparar los efectos del siniestro cuando éste se haya producido por cualquiera de las siguientes causas:\n\n1. Por negligencia grave del asegurado, del tomador del seguro o de las personas que de ellos dependan o con ellos convivan.\n2. Cuando el objeto asegurado sea sustraído fuera del lugar descrito en la póliza o con ocasión de su transporte, a no ser que una u otra circunstancias hubieran sido expresamente consentidas por el asegurador.\n3. Cuando la sustracción se produzca con ocasión de siniestros derivados de riesgos extraordinarios.`,
        cloze:`El asegurador, salvo [pacto] en contrario, NO vendrá obligado cuando:\n\n1. [Negligencia grave] del asegurado, tomador o personas que de ellos [dependan] o con ellos convivan.\n2. Objeto sustraído fuera del [lugar] descrito en la póliza o en [transporte], a no ser que hubieran sido expresamente [consentidas] por el asegurador.\n3. La sustracción se produzca con ocasión de [riesgos extraordinarios].`

        trigger:["recuperado","antes","plazo","abandono","pagada","retener","readquirir","restituir","propiedad"],
        struct:["Comunicado el siniestro, se observan estas reglas:","Regla 1: Recuperado ANTES del plazo → asegurado DEBE RECIBIRLO","Salvo que póliza le reconozca expresamente la facultad de ABANDONO al asegurador","Regla 2: Recuperado DESPUÉS del plazo + PAGADA la indemnización → asegurado elige:","Opción A: RETENER la indemnización y ceder la PROPIEDAD al asegurador","Opción B: READQUIRIR el objeto RESTITUYENDO la indemnización percibida"],
        lit:`Producido y debidamente comunicado el siniestro al asegurador, se observarán las reglas siguientes:\n\n1. Si el objeto asegurado es recuperado antes del transcurso del plazo señalado en la póliza, el asegurado deberá recibirlo, a menos que en ella le hubiera reconocido expresamente la facultad de su abandono al asegurador.\n2. Si el objeto asegurado es recuperado transcurrido el plazo pactado, y una vez pagada la indemnización, el asegurado podrá retener la indemnización percibida abandonando al asegurador la propiedad del objeto asegurado, o readquirirlo, restituyendo, en este caso, la indemnización percibida por la cosa o cosas restituidas.`,
        cloze:`Producido y comunicado el siniestro:\n\n1. Si el objeto es recuperado [antes] del plazo, el asegurado deberá [recibirlo], salvo que la póliza le hubiera reconocido la facultad de [abandono] al asegurador.\n2. Si el objeto es recuperado [transcurrido] el plazo y una vez [pagada] la indemnización, el asegurado podrá [retener] la indemnización y ceder la [propiedad] al asegurador, o [readquirirlo] [restituyendo] la indemnización.`

        lit:`Por el seguro de transporte terrestre el asegurador se obliga, dentro de los límites establecidos por la Ley y en el contrato, a indemnizar los daños materiales que puedan sufrir con ocasión o consecuencia del transporte las mercancías porteadas, el medio utilizado u otros objetos asegurados.`,

      {

        lit:`La póliza flotante no se encuentra regulada expresamente en la LCS. No obstante, en el art. 8 LCS establece: "En caso de póliza flotante, se especificará, además la forma en que debe hacerse la declaración del abono."\n\nCada póliza flotante asegura con carácter general una serie de riesgos de número indeterminado dentro de cierto plazo.\n\nSe trata de un verdadero contrato de seguro, no un contrato preparatorio.\n\nEn el momento de perfección del contrato el interés se determina de forma genérica y se determinará de modo concreto en el momento del acaecimiento del siniestro.\n\nEvita al asegurado los gastos y la pérdida de tiempo que supone la contratación diaria de seguros idénticos.\n\nProporciona al asegurador un cliente fijo durante un período largo de tiempo.`,
        cloze:`La póliza [flotante] no está regulada expresamente en la LCS, pero el art. 8 LCS indica que se especificará la forma en que debe hacerse la declaración del [abono].\n\nCada póliza flotante asegura una serie de riesgos de número [indeterminado] dentro de cierto [plazo].\n\nSe trata de un verdadero contrato de [seguro], no un contrato [preparatorio].\n\nEn la perfección del contrato: interés determinado de forma [genérica]. En el siniestro: de modo [concreto].\n\nVentaja asegurado: evita [gastos] y pérdida de tiempo de contratación [diaria]. Ventaja asegurador: [cliente fijo] durante largo período.`
      }
    ]
  }
];
