const S={selTopics:[],activeArts:[],mode:null,art:null,idx:0,
          srs:{},metrics:{},timer:{interval:null,secs:0,running:false},
          structOrder:[],clozeAnswers:[],user:null};

/* ── LocalStorage fallback ── */
function loadLocal(){
  try{const r=localStorage.getItem('lcs_srs');if(r)S.srs=JSON.parse(r);}catch(e){}
  try{const r=localStorage.getItem('lcs_met');if(r)S.metrics=JSON.parse(r);}catch(e){}
}
function saveLocal(){
  try{localStorage.setItem('lcs_srs',JSON.stringify(S.srs));
      localStorage.setItem('lcs_met',JSON.stringify(S.metrics));}catch(e){}
}
loadLocal();

/* ================================================================
   FIREBASE HELPERS (compat API)
   ================================================================ */
function setSyncDot(state){
  const d=document.getElementById('sync-dot');
  if(!d) return;
  d.className='sync-dot'+(state?' '+state:'');
}

async function saveToFirestore(){
  if(!S.user||!window._db) return;
  setSyncDot('syncing');
  try{
    await window._db.collection('users').doc(S.user.uid)
      .collection('data').doc('main')
      .set({srs:S.srs,metrics:S.metrics,updatedAt:Date.now()},{merge:true});
    setSyncDot('ok');
    setTimeout(()=>setSyncDot(''),2000);
  }catch(e){console.error(e);setSyncDot('err');}
}

async function loadFromFirestore(){
  if(!S.user||!window._db) return;
  setSyncDot('syncing');
  try{
    const snap=await window._db.collection('users').doc(S.user.uid)
      .collection('data').doc('main').get();
    if(snap.exists){
      const d=snap.data();
      if(d.srs)    S.srs=d.srs;
      if(d.metrics)S.metrics=d.metrics;
    }
    setSyncDot('ok');
    setTimeout(()=>setSyncDot(''),2000);
  }catch(e){console.error(e);setSyncDot('err');}
}

function save(){
  saveLocal();
  saveToFirestore();
}

/* ================================================================
   AUTH (compat API)
   ================================================================ */
function handleAuth(){
  if(!window._auth) return;
  if(S.user){
    window._auth.signOut().then(()=>{S.user=null;updateAuthBar();});
  }else{
    window._auth.signInWithPopup(window._provider)
      .then(r=>{ S.user=r.user; updateAuthBar(); loadFromFirestore().then(()=>renderDashboard_if_metrics()); })
      .catch(e=>alert('Error al iniciar sesión: '+e.message));
  }
}

function updateAuthBar(){
  const btn=document.getElementById('auth-btn');
  const name=document.getElementById('auth-name');
  if(!btn) return;
  if(S.user){
    btn.textContent='Salir';
    btn.classList.remove('primary');
    name.textContent=S.user.displayName||S.user.email||'Usuario';
    name.style.color='var(--green)';
  }else{
    btn.textContent='Entrar con Google';
    btn.classList.add('primary');
    name.textContent='Sin sesión';
    name.style.color='var(--muted)';
  }
}

function renderDashboard_if_metrics(){
  if(S.mode==='metrics') showMode('metrics');
  else if(!S.mode) goTopics(); // refresh home motivation after login
}

/* Escuchar cambios de auth cuando Firebase cargue */
(function waitForAuth(){
  if(window._auth){
    window._auth.onAuthStateChanged(user=>{
      S.user=user||null;
      updateAuthBar();
      if(user) loadFromFirestore().then(()=>renderDashboard_if_metrics());
    });
  } else {
    setTimeout(waitForAuth, 100);
  }
})();

/* ================================================================
   HELPERS
   ================================================================ */
function met(id){if(!S.metrics[id])S.metrics[id]={ca:0,ch:0,ta:0,th:0,sa:0,st:0,oral:[]};return S.metrics[id];}
function mc(){return document.getElementById('mc');}
function setNav(m){document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));const map={trigger:'nb-1',estructura:'nb-2',cloze:'nb-3',oral:'nb-4',srs:'nb-5',metrics:'nb-6'};if(map[m])document.getElementById(map[m])?.classList.add('active');}
function enableNav(){for(let i=1;i<=6;i++){const el=document.getElementById('nb-'+i);if(el)el.removeAttribute('disabled');}}
function buildArts(){S.activeArts=[];TEMAS.forEach(t=>{if(S.selTopics.includes(t.id))S.activeArts.push(...t.arts);});}

/* ================================================================
   TOPIC SCREEN
   ================================================================ */
function goTopics(){renderTopicsWithMotivation();}
function toggleTopic(id){const i=S.selTopics.indexOf(id);if(i>-1)S.selTopics.splice(i,1);else S.selTopics.push(id);document.querySelectorAll('.topic-card').forEach(c=>{c.classList.toggle('selected',S.selTopics.includes(parseInt(c.dataset.id)));});updSB();}
function selAll(){S.selTopics=TEMAS.map(t=>t.id);document.querySelectorAll('.topic-card').forEach(c=>c.classList.add('selected'));updSB();}
function clrAll(){S.selTopics=[];document.querySelectorAll('.topic-card').forEach(c=>c.classList.remove('selected'));updSB();}
function updSB(){const b=document.getElementById('sb');if(!b)return;const n=S.selTopics.length;b.textContent=n>0?`▶ Comenzar — ${n} tema(s) seleccionado(s)`:'Selecciona al menos un tema';b.disabled=n===0;}
function startStudy(){if(!S.selTopics.length)return;buildArts();enableNav();showMode('trigger');}
function renderTopics(){
  const cards=TEMAS.map(t=>{const sel=S.selTopics.includes(t.id);const studied=t.arts.filter(a=>S.srs[a.id]).length;return`<div class="topic-card ${sel?'selected':''}" data-id="${t.id}" onclick="toggleTopic(${t.id})"><div class="chk">✓</div><div class="num">TEMA ${t.id}</div><div class="title">${t.titulo}</div><div class="sub">${t.sub}</div><div class="stats">${t.arts.length} artículos · ${studied} con nivel SRS</div></div>`;}).join('');
  const motPlaceholder = S.user
    ? `<div id="mot-section"><div class="mot-loading">Cargando datos de motivación…</div></div>`
    : `<div id="mot-section" class="card" style="margin-bottom:16px;"><div style="font-size:.82rem;color:var(--muted);text-align:center;padding:12px;"><em>Inicia sesión con Google para ver tu panel de motivación con datos reales.</em></div></div>`;
  return`<div style="animation:fadeIn .3s ease">
    ${motPlaceholder}
    <div class="h2" style="margin-top:20px;">SELECTOR DE TEMAS</div>
    <div class="screen-sub" style="margin-bottom:12px;">Elige uno o varios temas para activar todos los modos de estudio.</div>
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
      <button class="btn btn-o" onclick="selAll()">Seleccionar todos</button>
      <button class="btn-g btn" onclick="clrAll()">Limpiar selección</button>
    </div>
    <div class="topic-grid">${cards}</div>
    <div style="margin-top:22px;">
      <button class="btn btn-gold" id="sb" onclick="startStudy()" disabled style="font-size:.9rem;padding:11px 32px;">Selecciona al menos un tema</button>
    </div>
  </div>`;
}

async function renderTopicsWithMotivation(){
  stopTimer(); setNav(null);
  mc().innerHTML = renderTopics();
  if (!S.user) return;
  const data = await loadMotivation();
  const el = document.getElementById('mot-section');
  if (el) {
    if (data) {
      el.innerHTML = renderMotivationBlocks(data);
    } else {
      el.innerHTML = `<div class="mot-block"><div class="mot-empty">No se pudieron cargar los datos de Firestore.</div></div>`;
    }
  }
}

/* ================================================================
   MODE ROUTING
   ================================================================ */
function showMode(mode){stopTimer();S.mode=mode;setNav(mode);if(!S.activeArts.length){buildArts();}if(!S.activeArts.length){goTopics();return;}if(mode==='srs'){pickSRS();renderSRS();return;}if(mode==='metrics'){mc().innerHTML=renderMetrics();return;}if(!S.art||!S.activeArts.find(a=>a.id===S.art.id)){S.idx=0;S.art=S.activeArts[0];}const r={trigger:renderTrigger,estructura:renderEstructura,cloze:renderCloze,oral:renderOral};mc().innerHTML=r[mode]();if(mode==='cloze')buildCloze();if(mode==='estructura')buildDrag();}
function nextArt(){S.idx=(S.idx+1)%S.activeArts.length;S.art=S.activeArts[S.idx];showMode(S.mode);}
function prevArt(){S.idx=(S.idx-1+S.activeArts.length)%S.activeArts.length;S.art=S.activeArts[S.idx];showMode(S.mode);}
function progBar(){const pct=Math.round(((S.idx+1)/S.activeArts.length)*100);const tema=TEMAS.find(t=>t.id===S.art.tema);return`<div class="pbar"><div class="pbfill" style="width:${pct}%"></div></div><div class="pinfo">${S.idx+1} / ${S.activeArts.length} artículos &nbsp;·&nbsp; Tema ${S.art.tema}: ${tema?.titulo||''}</div>`;}
function navRow(){return`<div class="nav-row"><button class="btn btn-g" onclick="prevArt()">← Anterior</button><button class="btn btn-o" onclick="nextArt()">Siguiente →</button></div>`;}
function diffBtns(id){return`<div class="lbl">Marcar nivel SRS:</div><div class="diff-row"><button class="db db-e" onclick="markSRSI('${id}','easy')">✓ Fácil</button><button class="db db-m" onclick="markSRSI('${id}','mid')">~ Medio</button><button class="db db-h" onclick="markSRSI('${id}','hard')">✗ Difícil</button></div>`;}
function markSRSI(id,level){const d={easy:7*864e5,mid:3*864e5,hard:864e5};S.srs[id]={level,lastSeen:Date.now(),nextSee:Date.now()+d[level]};save();event.target.textContent+=' ✓';event.target.disabled=true;}

/* ================================================================
   MODE 1 — TRIGGER
   ================================================================ */
function renderTrigger(){const a=S.art;return`<div class="card"><div class="card-header">① TRIGGER RECALL — Recuperación Activa <span>Escribe 5-10 palabras clave</span></div>${progBar()}<div class="art-badge">${a.art}</div><div class="art-title">${a.tit}</div><div class="lbl">Escribe todas las palabras clave que recuerdes de este artículo:</div><textarea id="ti" rows="3" placeholder="ej: prima, asegurador, indemnizar, riesgo, cobertura..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();checkTrigger();}"></textarea><div class="btn-row"><button class="btn" onclick="checkTrigger()">Comprobar y ver solución</button><button class="btn btn-g" onclick="nextArt()">Saltar →</button></div><div class="fb" id="tfb"></div><div id="tsol" style="display:none;margin-top:14px;"><div class="lbl">TEXTO ORIGINAL</div><div class="orig">${a.lit}</div><div style="margin-top:12px;">${diffBtns(a.id)}</div></div></div>${navRow()}`;}
function checkTrigger(){const a=S.art;const val=document.getElementById('ti').value.toLowerCase();const words=val.split(/[\s,;.\-]+/).filter(w=>w.length>1);const hits=[],misses=[];a.trigger.forEach(kw=>{const kwl=kw.toLowerCase();const found=words.some(w=>kwl.includes(w)||w.includes(kwl.split(' ')[0]));(found?hits:misses).push(kw);});const score=Math.round(hits.length/a.trigger.length*100);const fb=document.getElementById('tfb');fb.className='fb show '+(score>=70?'good':score>=40?'warn':'bad');fb.innerHTML=`<div class="score">${score}% — ${hits.length}/${a.trigger.length} palabras clave identificadas</div>${hits.map(k=>`<span class="ktag hit">✓ ${k}</span>`).join('')}${misses.map(k=>`<span class="ktag miss">✗ ${k}</span>`).join('')}`;document.getElementById('tsol').style.display='block';const m=met(a.id);m.ta++;m.th+=hits.length;save();}

/* ================================================================
   MODE 2 — ESTRUCTURA
   ================================================================ */
function renderEstructura(){const a=S.art;S.structOrder=[...a.struct].sort(()=>Math.random()-.5);return`<div class="card"><div class="card-header">② ESTRUCTURA — Reordenamiento Lógico <span>Arrastra al orden correcto</span></div>${progBar()}<div class="art-badge">${a.art}</div><div class="art-title">${a.tit}</div><div class="lbl">Arrastra para reconstruir el orden correcto del artículo:</div><ul class="slist" id="slist"></ul><div class="btn-row"><button class="btn" onclick="checkStruct()">Comprobar orden</button><button class="btn btn-g" onclick="nextArt()">Saltar →</button></div><div class="fb" id="sfb"></div><div id="ssol" style="display:none;margin-top:14px;"><div class="lbl">ORDEN CORRECTO</div><ul class="slist" id="sclist"></ul><div style="margin-top:10px;">${diffBtns(a.id)}</div></div></div>${navRow()}`;}
function buildDrag(){const list=document.getElementById('slist');if(!list)return;list.innerHTML='';S.structOrder.forEach((item,i)=>{const li=document.createElement('li');li.className='si';li.draggable=true;li.dataset.i=i;li.innerHTML=`<span class="drag-icon">⣿</span><span class="snum">${i+1}.</span><span>${item}</span>`;li.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',i);li.style.opacity='.4';});li.addEventListener('dragend',()=>{li.style.opacity='1';});li.addEventListener('dragover',e=>e.preventDefault());li.addEventListener('drop',e=>{e.preventDefault();const f=parseInt(e.dataTransfer.getData('text/plain'));const t=parseInt(li.dataset.i);[S.structOrder[f],S.structOrder[t]]=[S.structOrder[t],S.structOrder[f]];buildDrag();});list.appendChild(li);});}
function checkStruct(){const a=S.art;let ok=0;document.querySelectorAll('#slist .si').forEach((li,i)=>{const txt=li.querySelector('span:last-child').textContent;const isOk=txt===a.struct[i];li.className='si '+(isOk?'ok':'ko');if(isOk)ok++;});const score=Math.round(ok/a.struct.length*100);const fb=document.getElementById('sfb');fb.className='fb show '+(score>=80?'good':score>=50?'warn':'bad');fb.innerHTML=`<div class="score">${score}% — ${ok}/${a.struct.length} apartados en posición correcta</div>`;document.getElementById('ssol').style.display='block';document.getElementById('sclist').innerHTML=a.struct.map((s,i)=>`<li class="si ok"><span class="snum">${i+1}.</span><span>${s}</span></li>`).join('');const m=met(a.id);m.sa=(m.sa||0)+ok;m.st=(m.st||0)+a.struct.length;save();}

/* ================================================================
   MODE 3 — CLOZE
   ================================================================ */
function renderCloze(){const a=S.art;return`<div class="card"><div class="card-header">③ LITERALIDAD DIRIGIDA — Cloze Deletion <span>Completa la palabra exacta · Tab para avanzar</span></div>${progBar()}<div class="art-badge">${a.art}</div><div class="art-title">${a.tit}</div><div class="lbl">Completa los huecos con la palabra o expresión exacta:</div><div class="cloze-wrap" id="cw"></div><div class="btn-row"><button class="btn" onclick="checkCloze()">Corregir</button><button class="btn btn-g" onclick="resetCloze()">↺ Reintentar</button><button class="btn btn-g" onclick="nextArt()">Saltar →</button></div><div class="fb" id="cfb"></div><div id="csol" style="display:none;margin-top:14px;"><div class="lbl">TEXTO ORIGINAL COMPLETO</div><div class="orig">${a.lit}</div><div style="margin-top:10px;">${diffBtns(a.id)}</div></div></div>${navRow()}`;}
function buildCloze(){const a=S.art;const cw=document.getElementById('cw');if(!cw)return;S.clozeAnswers=[];const html=a.cloze.replace(/\[([^\]]+)\]/g,(m,w)=>{const idx=S.clozeAnswers.length;S.clozeAnswers.push(w);const sz=Math.max(6,w.length+2);return`<input type="text" class="ci" data-idx="${idx}" data-ans="${w.toLowerCase()}" style="width:${sz}ch" placeholder="${'_'.repeat(Math.min(w.length,8))}" onkeydown="if(event.key==='Tab'){event.preventDefault();focusNext(${idx});}">`;});cw.innerHTML=html.replace(/\n/g,'<br>');setTimeout(()=>cw.querySelector('.ci')?.focus(),50);}
function focusNext(i){const all=document.querySelectorAll('.ci');if(all[i+1])all[i+1].focus();}
function norm(s){return s.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function checkCloze(){const a=S.art;const inputs=document.querySelectorAll('.ci');let ok=0;inputs.forEach(inp=>{const ans=norm(inp.dataset.ans);const val=norm(inp.value);const isOk=val===ans||(val.length>=ans.length-2&&ans.startsWith(val.substring(0,Math.min(val.length,ans.length-1))));inp.classList.add(isOk?'ok':'ko');inp.disabled=true;if(!isOk){const s=document.createElement('span');s.className='ca';s.textContent=` (${inp.dataset.ans})`;inp.insertAdjacentElement('afterend',s);}if(isOk)ok++;});const score=Math.round(ok/inputs.length*100);const fb=document.getElementById('cfb');fb.className='fb show '+(score>=80?'good':score>=50?'warn':'bad');fb.innerHTML=`<div class="score">${score}% — ${ok}/${inputs.length} palabras correctas</div><div style="font-size:.8rem;color:var(--muted)">Las respuestas correctas aparecen en <span style="color:var(--gold)">dorado</span> junto a los huecos fallados.</div>`;document.getElementById('csol').style.display='block';const m=met(a.id);m.ca+=inputs.length;m.ch+=ok;save();}
function resetCloze(){document.querySelectorAll('.ci').forEach(i=>{i.value='';i.classList.remove('ok','ko');i.disabled=false;});document.querySelectorAll('.ca').forEach(s=>s.remove());document.getElementById('cfb').className='fb';document.getElementById('csol').style.display='none';document.querySelectorAll('.ci')[0]?.focus();}

/* ================================================================
   MODE 4 — ORAL
   ================================================================ */
function renderOral(){const a=S.art;return`<div class="card"><div class="card-header">④ SIMULACIÓN ORAL — Exposición Cronometrada <span>Expón sin ver el texto</span></div>${progBar()}<div class="art-badge">${a.art}</div><div class="art-title">${a.tit}</div><div class="tcontrols"><select id="tsel"><option value="60">1 min ⚡</option><option value="120">2 min</option><option value="180" selected>3 min</option><option value="240">4 min</option><option value="300">5 min</option></select><button class="btn btn-green" id="tbtn" onclick="toggleTimer()">▶ Iniciar</button><button class="btn btn-g" onclick="resetTimer()">↺ Reset</button></div><div class="timer" id="td">3:00</div><div class="lbl">Tu respuesta escrita (o notas tras la exposición oral):</div><textarea id="oi" rows="6" placeholder="Expón en voz alta y luego escribe lo que hayas cubierto, o escribe directamente..."></textarea><div class="btn-row"><button class="btn" onclick="showOralSol()">Ver artículo original</button><button class="btn btn-g" onclick="nextArt()">Siguiente →</button></div><div id="osol" style="display:none;margin-top:14px;"><div class="lbl">ARTÍCULO ORIGINAL</div><div class="orig">${a.lit}</div><div class="lbl" style="margin-top:14px;">AUTOEVALUACIÓN DE COBERTURA</div><div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;"><button class="db db-e" onclick="recOral('alta')">✓ Alta cobertura</button><button class="db db-m" onclick="recOral('media')">~ Media cobertura</button><button class="db db-h" onclick="recOral('baja')">✗ Baja cobertura</button></div><div id="oeval" style="display:none;" class="fb show good"></div><div style="margin-top:12px;">${diffBtns(a.id)}</div></div></div>${navRow()}`;}
function toggleTimer(){if(S.timer.running){stopTimer();return;}const sel=document.getElementById('tsel');const secs=sel?parseInt(sel.value):180;S.timer.secs=secs;S.timer.running=true;document.getElementById('tbtn').textContent='⏸ Pausar';updTimer();S.timer.interval=setInterval(()=>{S.timer.secs--;updTimer();if(S.timer.secs<=0){stopTimer();endTimer();}},1000);}
function stopTimer(){clearInterval(S.timer.interval);S.timer.interval=null;S.timer.running=false;const b=document.getElementById('tbtn');if(b)b.textContent='▶ Continuar';}
function resetTimer(){stopTimer();const sel=document.getElementById('tsel');S.timer.secs=sel?parseInt(sel.value):180;updTimer();const b=document.getElementById('tbtn');if(b)b.textContent='▶ Iniciar';}
function updTimer(){const d=document.getElementById('td');if(!d)return;const m=Math.floor(S.timer.secs/60),s=S.timer.secs%60;d.textContent=`${m}:${String(s).padStart(2,'0')}`;d.classList.toggle('urgent',S.timer.secs<=30);}
function endTimer(){const d=document.getElementById('td');if(d){d.textContent='⏱ ¡Tiempo!';d.style.color='var(--red)';}}
function showOralSol(){document.getElementById('osol').style.display='block';stopTimer();}
function recOral(level){const a=S.art;const m=met(a.id);m.oral.push({level,date:Date.now()});save();const e=document.getElementById('oeval');e.style.display='block';e.textContent=`Registrado: cobertura ${level}.`;}

/* ================================================================
   MODE 5 — SRS
   ================================================================ */
function pickSRS(){const now=Date.now();const scored=S.activeArts.map(a=>{const srs=S.srs[a.id];if(!srs)return{a,score:1e9};const ov=now-srs.nextSee;const mult=srs.level==='hard'?3:srs.level==='mid'?2:1;return{a,score:ov>0?ov*mult:-1};}).sort((a,b)=>b.score-a.score);S.art=scored[0].a;S.idx=S.activeArts.indexOf(S.art);}
function renderSRS(){const a=S.art;const srs=S.srs[a.id];const level=srs?.level||'sin calificar';const now=Date.now();const due=S.activeArts.filter(x=>{const s=S.srs[x.id];return!s||now>=s.nextSee;}).length;const tema=TEMAS.find(t=>t.id===a.tema);mc().innerHTML=`<div class="card"><div class="card-header">⑤ REPETICIÓN ESPACIADA — Artículo Prioritario <span>Tema ${a.tema}: ${tema?.titulo||''}</span></div><div class="queue-info"><div>Pendientes hoy: <b>${due}</b></div><div>Total artículos: <b>${S.activeArts.length}</b></div><div>Nivel actual: <b class="${level==='easy'?'be':level==='mid'?'bm':level==='hard'?'bh':''}"> ${level}</b></div></div><div class="art-badge">${a.art}</div><div class="art-title">${a.tit}</div><div class="lbl">Intenta recordar el contenido completo antes de ver la solución:</div><textarea id="srsi" rows="5" placeholder="Escribe lo que recuerdas del artículo..."></textarea><div class="btn-row"><button class="btn" onclick="revealSRS()">Revelar artículo</button></div><div id="srsol" style="display:none;margin-top:14px;"><div class="lbl">ARTÍCULO ORIGINAL</div><div class="orig">${a.lit}</div><div class="lbl" style="margin-top:12px;">¿Cómo lo has recordado?</div><div class="diff-row"><button class="db db-e" onclick="markSRS('easy')">✓ Fácil<br><small>próximo: 7 días</small></button><button class="db db-m" onclick="markSRS('mid')">~ Medio<br><small>próximo: 3 días</small></button><button class="db db-h" onclick="markSRS('hard')">✗ Difícil<br><small>próximo: 1 día</small></button></div></div></div>`;}
function revealSRS(){document.getElementById('srsol').style.display='block';}
function markSRS(level){const d={easy:7*864e5,mid:3*864e5,hard:864e5};S.srs[S.art.id]={level,lastSeen:Date.now(),nextSee:Date.now()+d[level]};save();pickSRS();renderSRS();}

/* ================================================================
   MODE 6 — METRICS
   ================================================================ */
function renderMetrics(){if(!S.activeArts.length)return`<div class="empty">Selecciona temas primero.</div>`;let tc=0,th=0,ta=0,tah=0,std=0;S.activeArts.forEach(a=>{const m=S.metrics[a.id];if(!m)return;tc+=m.ca||0;th+=m.ch||0;ta+=m.ta||0;tah+=m.th||0;if((m.ca||0)+(m.ta||0)>0)std++;});const cs=tc>0?Math.round(th/tc*100)+' %':'-';const ts=ta>0?Math.round(tah/ta*100)+' %':'-';const pills=TEMAS.map(t=>{const aa=t.arts.filter(a=>S.activeArts.find(x=>x.id===a.id));if(!aa.length)return'';const done=aa.filter(a=>{const m=S.metrics[a.id];return m&&(m.ca||0)+(m.ta||0)>0;}).length;return`<span class="pill">Tema ${t.id}: ${done}/${aa.length}</span>`;}).join('');const rows=S.activeArts.map(a=>{const m=S.metrics[a.id]||{};const srs=S.srs[a.id];const level=srs?.level;const cl=m.ca>0?Math.round(m.ch/m.ca*100)+'%':'-';const tr=m.ta>0?Math.round(m.th/m.ta*100)+'%':'-';const lc=level==='easy'?'be':level==='mid'?'bm':level==='hard'?'bh':'';const next=srs?new Date(srs.nextSee).toLocaleDateString('es-ES'):'-';return`<tr><td style="font-family:var(--mono);font-size:.75rem;color:var(--accent)">${a.art}</td><td style="font-size:.73rem;color:var(--muted)">${a.tit.slice(0,36)}${a.tit.length>36?'…':''}</td><td style="text-align:center">${cl}</td><td style="text-align:center">${tr}</td><td class="${lc}" style="text-align:center">${level||'-'}</td><td style="text-align:center;font-family:var(--mono);font-size:.68rem;color:var(--muted)">${next}</td></tr>`;}).join('');return`<div class="card"><div class="card-header">⑥ MÉTRICAS DE RENDIMIENTO ${S.user?`<span>☁ Sincronizado como ${S.user.displayName||S.user.email}</span>`:''}</div><div style="margin-bottom:12px;">${pills}</div><div class="mgrid"><div class="mbox"><div class="mval">${cs}</div><div class="mlbl">% Literalidad (Cloze)</div></div><div class="mbox"><div class="mval">${ts}</div><div class="mlbl">% Trigger Recall</div></div><div class="mbox"><div class="mval">${std}</div><div class="mlbl">Artículos trabajados</div></div><div class="mbox"><div class="mval">${S.activeArts.length}</div><div class="mlbl">Artículos activos</div></div></div><div class="lbl">HISTORIAL POR ARTÍCULO</div><div style="overflow-x:auto;"><table><thead><tr><th>ARTÍCULO</th><th>TÍTULO</th><th>CLOZE</th><th>TRIGGER</th><th>SRS</th><th>PRÓX. REPASO</th></tr></thead><tbody>${rows}</tbody></table></div><div class="btn-row" style="margin-top:14px;"><button class="btn btn-g" onclick="if(confirm('¿Borrar todas las estadísticas?')){S.metrics={};S.srs={};save();showMode('metrics');}">🗑 Borrar estadísticas</button></div></div>`;}

/* ================================================================
   FIRESTORE SERVICE LAYER — desacoplada de la UI
   ================================================================ */
const FirestoreService = {

  async getTodayDueMicroitems(uid) {
    if (!window._db || !uid) return [];
    try {
      const now = Date.now();
      const topicsSnap = await window._db
        .collection('users').doc(uid)
        .collection('topics').get();
      const results = [];
      for (const topicDoc of topicsSnap.docs) {
        const itemsSnap = await window._db
          .collection('users').doc(uid)
          .collection('topics').doc(topicDoc.id)
          .collection('microitems').get();
        for (const itemDoc of itemsSnap.docs) {
          const d = itemDoc.data();
          const nextReview = d.nextReviewAt?.toMillis?.() || d.nextReviewAt || 0;
          if (nextReview <= now) {
            results.push({
              id: itemDoc.id,
              topicId: topicDoc.id,
              topicTitle: topicDoc.data().title || topicDoc.id,
              domainScore: d.domainScore ?? null,
              riskScore: d.riskScore ?? null,
              averageLatency: d.averageLatency ?? null,
              nextReviewAt: nextReview
            });
          }
        }
      }
      return results;
    } catch(e) { console.error('getTodayDueMicroitems:', e); return []; }
  },

  async getFragileTopics(uid) {
    if (!window._db || !uid) return [];
    try {
      const snap = await window._db
        .collection('users').doc(uid)
        .collection('topics').get();
      const topics = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      const fragile = topics.filter(t =>
        t.fragilityLevel === 'red' ||
        t.fragilityLevel === 'orange' ||
        (t.riskScore != null && t.riskScore > 0.6)
      );
      fragile.sort((a, b) => {
        const order = { red: 0, orange: 1, yellow: 2, green: 3 };
        return (order[a.fragilityLevel] ?? 4) - (order[b.fragilityLevel] ?? 4)
            || (b.riskScore || 0) - (a.riskScore || 0);
      });
      return fragile.slice(0, 5);
    } catch(e) { console.error('getFragileTopics:', e); return []; }
  },

  async getDashboardSummary(uid) {
    if (!window._db || !uid) return null;
    try {
      const userSnap = await window._db.collection('users').doc(uid).get();
      const userData = userSnap.exists ? userSnap.data() : {};
      const days = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(); d.setDate(d.getDate() - i);
        days.push(d.toISOString().slice(0,10).replace(/-/g,''));
      }
      const statsArr = [];
      for (const day of days) {
        const snap = await window._db
          .collection('users').doc(uid)
          .collection('dailyStats').doc(day).get();
        if (snap.exists) statsArr.push({ date: day, ...snap.data() });
      }
      const recallValues = statsArr.map(s => s.avgRecall).filter(v => v != null);
      let trend = 'flat';
      if (recallValues.length >= 2) {
        const diff = recallValues[0] - recallValues[recallValues.length - 1];
        trend = diff > 0.05 ? 'up' : diff < -0.05 ? 'down' : 'flat';
      }
      const latArr = statsArr.filter(s => s.avgLatency != null);
      const avgLatency7d = latArr.length
        ? latArr.reduce((a, s) => a + s.avgLatency, 0) / latArr.length
        : null;
      return {
        bestStreak:    userData.bestStreak    ?? 0,
        currentStreak: userData.currentStreak ?? 0,
        domainScore:   userData.domainScore   ?? null,
        avgRisk:       userData.avgRisk       ?? null,
        avgLatency7d,
        trend,
        recentStats: statsArr
      };
    } catch(e) { console.error('getDashboardSummary:', e); return null; }
  }
};

/* ================================================================
   MOTIVACIÓN HOME — lógica desacoplada
   ================================================================ */
async function loadMotivation() {
  if (!S.user) return null;
  try {
    const [summary, dueItems, fragileTopics] = await Promise.all([
      FirestoreService.getDashboardSummary(S.user.uid),
      FirestoreService.getTodayDueMicroitems(S.user.uid),
      FirestoreService.getFragileTopics(S.user.uid)
    ]);
    return { summary, dueItems, fragileTopics };
  } catch(e) { console.error('loadMotivation:', e); return null; }
}

function buildRecommendation(summary, dueItems) {
  if (!summary && (!dueItems || !dueItems.length))
    return { icon:'💡', text:'Empieza con una sesión breve para activar el sistema de seguimiento.' };
  if (summary?.avgRisk != null && summary.avgRisk > 0.6)
    return { icon:'⚠️', text:'Tu riesgo medio es alto. Prioriza los ítems críticos antes de avanzar.' };
  if (summary?.avgLatency7d != null && summary.avgLatency7d > 8000)
    return { icon:'⚡', text:'Tu latencia de evocación está elevada. Entrena recuperación rápida con sesiones cronometradas.' };
  if (dueItems && dueItems.length > 10)
    return { icon:'📚', text:`Tienes ${dueItems.length} ítems vencidos. Una sesión de 10–15 min hoy reducirá el riesgo de olvido.` };
  if (summary?.currentStreak > 0)
    return { icon:'🔥', text:`Llevas ${summary.currentStreak} días seguidos. Mantén el hábito con al menos una sesión breve hoy.` };
  return { icon:'✅', text:'Tu progreso es estable. Revisa los temas más frágiles para consolidar.' };
}

function renderMotivationBlocks(data) {
  const { summary, dueItems, fragileTopics } = data || {};

  /* CABECERA */
  const streak = summary?.currentStreak ?? 0;
  const domain = summary?.domainScore  != null ? Math.round(summary.domainScore) : null;
  const risk   = summary?.avgRisk      != null ? summary.avgRisk : null;
  const riskCls = risk == null ? '' : risk > 0.6 ? 'danger' : risk > 0.35 ? 'warn' : '';

  const headerHTML = `
    <div class="home-header">
      <div class="home-stat streak">
        <div class="hs-val">${streak > 0 ? '🔥' : '○'}&thinsp;${streak}</div>
        <div class="hs-lbl">Racha actual</div>
      </div>
      <div class="home-stat domain">
        <div class="hs-val">${domain != null ? domain+'%' : '—'}</div>
        <div class="hs-lbl">Dominio global</div>
      </div>
      <div class="home-stat risk ${riskCls}">
        <div class="hs-val">${risk != null ? Math.round(risk*100)+'%' : '—'}</div>
        <div class="hs-lbl">Riesgo medio</div>
      </div>
    </div>`;

  /* HOY */
  const due = dueItems || [];
  const dueCount = due.length;
  const riskDueArr = due.filter(x => x.riskScore != null);
  const avgRiskDue = riskDueArr.length
    ? riskDueArr.reduce((a, x) => a + x.riskScore, 0) / riskDueArr.length : null;
  const estimSec = dueCount * 25;
  const estimDisplay = dueCount > 0
    ? (estimSec >= 60 ? `~${Math.round(estimSec/60)} min` : `~${estimSec}s`) : '—';

  const hoyHTML = `
    <div class="mot-block">
      <div class="mot-block-title">Hoy <span>${new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</span></div>
      <div class="hoy-grid">
        <div class="hoy-stat">
          <div class="hv" style="color:${dueCount>0?'var(--gold)':'var(--muted)'}">${dueCount}</div>
          <div class="hl">Ítems vencidos</div>
        </div>
        <div class="hoy-stat">
          <div class="hv" style="color:${avgRiskDue!=null&&avgRiskDue>0.6?'var(--red)':'var(--muted)'}">${avgRiskDue!=null?Math.round(avgRiskDue*100)+'%':'—'}</div>
          <div class="hl">Riesgo medio</div>
        </div>
        <div class="hoy-stat">
          <div class="hv">${estimDisplay}</div>
          <div class="hl">Tiempo estimado</div>
        </div>
      </div>
      ${dueCount>0
        ? `<button class="btn" onclick="startStudy()" style="width:100%;margin-top:6px;">▶ Empezar sesión — ${dueCount} ítems</button>`
        : `<div class="mot-empty">Sin ítems vencidos hoy 🎉</div>`}
    </div>`;

  /* PROGRESO REAL */
  const trend = summary?.trend || 'flat';
  const trendLabel = {up:'↑ Mejorando', down:'↓ Bajando', flat:'= Estable'}[trend];
  const latDisplay = summary?.avgLatency7d != null
    ? (summary.avgLatency7d/1000).toFixed(1)+'s' : '—';
  const latPct = summary?.avgLatency7d != null
    ? Math.min(100, Math.round(summary.avgLatency7d/120)) : 0;

  const progresoHTML = `
    <div class="mot-block">
      <div class="mot-block-title">Progreso real <span class="trend ${trend}">${trendLabel}</span></div>
      <div class="progress-row">
        <span class="prog-label">Dominio</span>
        <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${domain??0}%;background:var(--accent)"></div></div>
        <span style="font-family:var(--mono);font-size:.75rem;color:var(--accent);min-width:38px;text-align:right">${domain!=null?domain+'%':'—'}</span>
      </div>
      <div class="progress-row">
        <span class="prog-label">Riesgo</span>
        <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${risk!=null?Math.round(risk*100):0}%;background:${riskCls==='danger'?'var(--red)':riskCls==='warn'?'var(--gold)':'var(--green)'}"></div></div>
        <span style="font-family:var(--mono);font-size:.75rem;color:var(--muted);min-width:38px;text-align:right">${risk!=null?Math.round(risk*100)+'%':'—'}</span>
      </div>
      <div class="progress-row">
        <span class="prog-label">Latencia</span>
        <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${latPct}%;background:var(--gold)"></div></div>
        <span style="font-family:var(--mono);font-size:.75rem;color:var(--muted);min-width:38px;text-align:right">${latDisplay}</span>
      </div>
    </div>`;

  /* ATENCIÓN PRIORITARIA */
  let fragileHTML = '';
  if (fragileTopics && fragileTopics.length) {
    const items = fragileTopics.map(t => {
      const col = t.fragilityLevel || (t.riskScore > 0.6 ? 'orange' : 'yellow');
      return `<div class="fragile-item">
        <div class="fragile-dot ${col}"></div>
        <span class="fragile-name">${t.title || t.id}</span>
        <span class="fragile-score">${t.riskScore!=null?Math.round(t.riskScore*100)+'%':t.fragilityLevel||'—'}</span>
      </div>`;
    }).join('');
    fragileHTML = `
      <div class="mot-block">
        <div class="mot-block-title">Atención prioritaria <span>temas frágiles</span></div>
        <div class="fragile-list">${items}</div>
      </div>`;
  }

  /* RECOMENDACIÓN */
  const rec = buildRecommendation(summary, dueItems);
  const recHTML = `
    <div class="mot-block">
      <div class="mot-block-title">Recomendación</div>
      <div class="rec-banner"><span class="rec-icon">${rec.icon}</span>${rec.text}</div>
    </div>`;

  return headerHTML + hoyHTML + progresoHTML + fragileHTML + recHTML;
}

/* INIT */
goTopics();
</script>
</body>
</html>
